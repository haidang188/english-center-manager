<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-page">
    <section class="auth-card">
        <div class="auth-visual" aria-hidden="true">
            <div class="shape shape-square"></div>
            <div class="shape shape-ring"></div>
            <div class="shape shape-triangle"></div>
            <div class="illustration-circle">
                <div class="monitor">
                    <div class="avatar-head"></div>
                    <div class="avatar-body"></div>
                </div>
            </div>
        </div>

        <div class="auth-panel">
            <h1>Member Login</h1>

            <p th:if="${param.error}" class="alert alert-error">Email or password is incorrect.</p>
            <p th:if="${param.logout}" class="alert alert-success">You have logged out.</p>
            <p th:if="${param.registered}" class="alert alert-success">Account created. Please login.</p>

            <form th:action="@{/login}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label class="input-pill">
                    <span class="input-icon">✉</span>
                    <input type="email" name="email" placeholder="Email" autocomplete="username" required>
                </label>

                <label class="input-pill">
                    <span class="input-icon">■</span>
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </label>

                <button type="submit" class="primary-button">LOGIN</button>
            </form>

            <a class="muted-link" href="#">Forgot Username / Password?</a>
            <a class="create-link" th:href="@{/register}">Create your Account <span>→</span></a>
        </div>
    </section>
</main>
</body>
</html>
