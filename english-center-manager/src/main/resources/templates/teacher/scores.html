<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý điểm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{teacher/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{teacher/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Quản lý điểm</h3>
                    <span>Chọn lớp để xem bảng điểm, sau đó bấm chi tiết để nhập điểm cho từng học viên.</span>
                </div>
                <a th:href="@{/teacher}" class="secondary-link">Dashboard</a>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/teacher/scores}" method="get" class="filter-form advanced">
                <select name="classId" required>
                    <option value="">Chọn lớp học</option>
                    <option th:each="courseClass : ${classes}"
                            th:value="${courseClass.id}"
                            th:selected="${selectedClassId != null and selectedClassId == courseClass.id}"
                            th:text="${courseClass.classCode + ' - ' + courseClass.className}">
                    </option>
                </select>
                <button type="submit">Mở bảng điểm</button>
            </form>
        </section>

        <section class="panel" th:if="${scoreBoard != null}">
            <div class="panel-header">
                <div>
                    <h3 th:text="${selectedClass.className}">Bảng điểm lớp</h3>
                    <span th:text="${selectedClass.course.courseName}"></span>
                </div>
                <a th:href="@{/teacher/classes/{id}/students(id=${selectedClass.id})}" class="secondary-link">Xem học viên</a>
            </div>

            <div class="empty-row" th:if="${#lists.isEmpty(scoreBoard.inputComponents)}">
                Khóa học này chưa có thành phần điểm để nhập.
            </div>

            <div class="table-wrapper" th:if="${not #lists.isEmpty(scoreBoard.inputComponents)}">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên học viên</th>
                        <th th:each="component : ${scoreBoard.inputComponents}" th:text="${component.componentName}"></th>
                        <th>Điểm trung bình</th>
                        <th>Chi tiết</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="classStudent, iterStat : ${scoreBoard.classStudents}">
                        <td th:text="${iterStat.count}"></td>
                        <td>
                            <strong th:text="${classStudent.student.fullName}"></strong>
                            <small th:text="${classStudent.student.email}"></small>
                        </td>
                        <td th:each="component : ${scoreBoard.inputComponents}">
                            <span th:if="${scoreBoard.scoreValue(classStudent.id, component.id) != null}"
                                  th:text="${scoreBoard.scoreValue(classStudent.id, component.id)}"></span>
                            <span th:if="${scoreBoard.scoreValue(classStudent.id, component.id) == null}">-</span>
                        </td>
                        <td>
                            <span th:if="${scoreBoard.averageScore(classStudent.id) != null}"
                                  th:text="${#numbers.formatDecimal(scoreBoard.averageScore(classStudent.id), 1, 2)}"></span>
                            <span th:if="${scoreBoard.averageScore(classStudent.id) == null}">Chưa đủ điểm</span>
                        </td>
                        <td>
                            <a th:href="@{/teacher/scores/{classId}/students/{studentId}(classId=${scoreBoard.courseClass.id}, studentId=${classStudent.id})}" class="small-button detail">Chi tiết</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(scoreBoard.classStudents)}">
                        <td th:colspan="${#lists.size(scoreBoard.inputComponents) + 4}" class="empty-row">
                            Lớp này chưa có học viên.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
