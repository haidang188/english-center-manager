<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diem - Staff</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{staff/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Nhap va cap nhat diem</h3>
                    <span>Diem duoc nhap theo cau hinh thanh phan diem cua tung khoa hoc</span>
                </div>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/staff/scores}" method="get" class="filter-form advanced">
                <select name="classId" required>
                    <option value="">Chon lop hoc</option>
                    <option th:each="courseClass : ${classes}"
                            th:value="${courseClass.id}"
                            th:selected="${selectedClassId != null and selectedClassId == courseClass.id}"
                            th:text="${courseClass.classCode} + ' - ' + ${courseClass.className}">
                    </option>
                </select>
                <button type="submit">Mo bang diem</button>
            </form>
        </section>

        <section class="panel dashboard-classes" th:if="${selectedClass != null}">
            <div class="panel-header">
                <div>
                    <h3 th:text="${selectedClass.className}">Lop hoc</h3>
                    <span th:text="${selectedClass.course.courseName}"></span>
                </div>
                <a th:href="@{/staff/classes/{id}/students(id=${selectedClass.id})}" class="secondary-link">Xem hoc vien</a>
            </div>

            <div class="content-grid">
                <div>
                    <form th:action="@{/staff/scores}" method="get" class="filter-form advanced">
                        <input type="hidden" name="classId" th:value="${selectedClass.id}">
                        <select name="examSessionId">
                            <option value="">Dot diem moi nhat</option>
                            <option th:each="session : ${sessions}"
                                    th:value="${session.id}"
                                    th:selected="${selectedSessionId != null and selectedSessionId == session.id}"
                                    th:text="${session.examName} + ' - ' + ${session.examDate}">
                            </option>
                        </select>
                        <button type="submit">Chon dot</button>
                    </form>
                </div>

                <div>
                    <form th:action="@{/staff/scores/sessions}"
                          th:object="${examSessionForm}"
                          method="post"
                          class="filter-form advanced">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="classId" th:value="${selectedClass.id}">
                        <input type="text" th:field="*{examName}" placeholder="Ten dot diem" required>
                        <input type="date" th:field="*{examDate}" required>
                        <input type="text" th:field="*{note}" placeholder="Ghi chu">
                        <button type="submit">Tao dot</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="panel dashboard-classes" th:if="${scoreBoard != null}">
            <div class="panel-header">
                <div>
                    <h3 th:text="${scoreBoard.examSession.examName}">Bang diem</h3>
                    <span th:text="'Ngay: ' + ${scoreBoard.examSession.examDate}"></span>
                </div>
            </div>

            <div class="empty-text" th:if="${#lists.isEmpty(scoreBoard.inputComponents)}">
                Khoa hoc nay chua co thanh phan diem de nhap.
            </div>

            <form th:if="${not #lists.isEmpty(scoreBoard.inputComponents)}"
                  th:action="@{/staff/scores/{classId}/{sessionId}(classId=${scoreBoard.courseClass.id}, sessionId=${scoreBoard.examSession.id})}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>Hoc vien</th>
                            <th th:each="component : ${scoreBoard.inputComponents}">
                                <span th:text="${component.componentName}"></span>
                                <small th:if="${component.maxScore != null}" th:text="'Toi da ' + ${component.maxScore}"></small>
                            </th>
                            <th>Diem trung binh</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="classStudent : ${scoreBoard.classStudents}">
                            <td>
                                <strong th:text="${classStudent.student.fullName}"></strong>
                                <small th:text="${classStudent.student.email}"></small>
                            </td>
                            <td th:each="component : ${scoreBoard.inputComponents}">
                                <input type="number"
                                       step="0.01"
                                       min="0"
                                       th:max="${component.maxScore}"
                                       th:name="|score_${classStudent.id}_${component.id}|"
                                       th:value="${scoreBoard.scoreValue(classStudent.id, component.id)}"
                                       class="compact-select">
                            </td>
                            <td>
                                <span th:if="${scoreBoard.averageScore(classStudent.id) != null}"
                                      th:text="${#numbers.formatDecimal(scoreBoard.averageScore(classStudent.id), 1, 2)}"></span>
                                <span th:if="${scoreBoard.averageScore(classStudent.id) == null}">Chua du diem</span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(scoreBoard.classStudents)}">
                            <td th:colspan="${#lists.size(scoreBoard.inputComponents) + 2}" class="empty-row">
                                Lop nay chua co hoc vien
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Luu bang diem</button>
                </div>
            </form>
        </section>

        <section class="panel dashboard-classes" th:if="${selectedClass != null and scoreBoard == null}">
            <div class="empty-text">Chua co dot diem. Hay tao dot diem de bat dau nhap diem.</div>
        </section>
    </main>
</div>
</body>
</html>
