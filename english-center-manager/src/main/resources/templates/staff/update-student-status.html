<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cập nhật trạng thái học viên</title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

    <link rel="stylesheet"
          th:href="@{/css/staff.css}">
</head>

<body>

<div class="admin-shell">

    <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">

        <div th:replace="~{staff/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">

            <div class="panel-header">

                <div>

                    <h3 class="staff-title">Cập nhật trạng thái học viên</h3>

                    <span>Ghi nhận thay đổi trạng thái học tập trong lớp</span>

                </div>

                <a class="cancel-button"
                   th:href="@{/staff/classes/{id}/students(id=${classStudent.courseClass.id})}">
                    Quay lại
                </a>

            </div>

            <div class="class-info">

                <div class="class-info-card">
                    <h4>Học viên</h4>
                    <p th:text="${classStudent.student.fullName}"></p>
                </div>

                <div class="class-info-card">
                    <h4>Email</h4>
                    <p th:text="${classStudent.student.email}"></p>
                </div>

                <div class="class-info-card">
                    <h4>Lớp học</h4>
                    <p th:text="${classStudent.courseClass.className}"></p>
                </div>

                <div class="class-info-card">
                    <h4>Hiện tại</h4>
                    <p th:text="${classStudent.status}"></p>
                </div>

            </div>

            <form th:object="${updateStudentStatusForm}"
                  method="post"
                  th:action="@{/staff/class-students/{id}/status(id=${classStudent.id})}"
                  class="admin-form">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden"
                       th:field="*{classStudentId}">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Trạng thái mới</label>

                        <select th:field="*{status}">
                            <option th:each="item : ${studentStatuses}"
                                    th:value="${item}"
                                    th:text="${item}">
                            </option>
                        </select>

                        <p class="field-error"
                           th:if="${#fields.hasErrors('status')}"
                           th:errors="*{status}">
                        </p>
                    </div>

                    <div class="form-group full">
                        <label>Ghi chú</label>

                        <textarea th:field="*{note}"
                                  rows="4"
                                  placeholder="Nhập ghi chú nếu có"></textarea>
                    </div>

                </div>

                <div class="form-actions">

                    <button type="submit"
                            class="action-button">
                        Lưu trạng thái
                    </button>

                    <a class="cancel-button"
                       th:href="@{/staff/classes/{id}/students(id=${classStudent.courseClass.id})}">
                        Hủy
                    </a>

                </div>

            </form>

        </section>

    </main>

</div>

</body>

</html>
