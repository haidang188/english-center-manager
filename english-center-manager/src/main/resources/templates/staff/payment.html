<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Cập nhật thanh toán</title>

  <link rel="stylesheet"
        th:href="@{/css/admin.css}">

  <link rel="stylesheet"
        th:href="@{/css/staff.css}">

</head>

<body>

<div class="admin-shell">

  <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

  <main class="admin-main">

    <div th:replace="~{staff/fragments/topbar :: topbar}"></div>

    <section class="panel form-panel">

      <div class="panel-header">

        <div>

          <h3>Cập nhật thanh toán</h3>

          <span>Xác nhận học viên đã hoàn thành học phí</span>

        </div>

        <a th:href="@{/staff/tuition-batches/{id}(id=${batch.id})}"
           class="secondary-link">

          Quay lại

        </a>

      </div>

      <div class="class-info">

        <div class="class-info-card">

          <h4>Học viên</h4>

          <p th:text="${studentTuition.student.fullName}"></p>

        </div>

        <div class="class-info-card">

          <h4>Lớp học</h4>

          <p th:text="${studentTuition.tuitionBatch.courseClass.className}"></p>

        </div>

        <div class="class-info-card">

          <h4>Số tiền</h4>

          <p th:text="${#numbers.formatDecimal(studentTuition.amount,0,'COMMA',0,'POINT')} + ' VNĐ'"></p>

        </div>

      </div>



      <form th:object="${paymentForm}"
            method="post"
            th:action="@{/staff/student-tuitions/{id}/payment(id=${studentTuition.id})}"
            class="admin-form">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="form-grid">

          <div class="form-group">

            <label>Số tiền đã thu</label>

            <input type="number"
                   th:field="*{paidAmount}">

          </div>

          <div class="form-group">

            <label>Phương thức thanh toán</label>

            <select th:field="*{paymentMethod}">

              <option value="">-- Chọn --</option>

              <option th:each="item : ${paymentMethods}"
                      th:value="${item}"
                      th:text="${item}">
              </option>

            </select>

          </div>

          <div class="form-group full">

            <label>Ghi chú</label>

            <textarea th:field="*{note}"
                      rows="4">

            </textarea>

          </div>

        </div>

        <div class="form-actions">

          <button type="submit"
                  class="action-button">

            Xác nhận thanh toán

          </button>

          <a class="cancel-button"

             th:href="@{/staff/tuition-batches/{id}(id=${batch.id})}">

            Hủy

          </a>

        </div>

      </form>

    </section>

  </main>

</div>

</body>

</html>
