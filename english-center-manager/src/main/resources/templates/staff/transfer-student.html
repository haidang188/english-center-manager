<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chuyển lớp học viên</title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

    <link rel="stylesheet"
          th:href="@{/css/staff.css}">

</head>

<body>

<div class="admin-shell">

    <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">

        <div th:replace="~{staff/fragments/topbar :: topbar}"></div>

        <section class="panel transfer-box">

            <div class="panel-header">

                <div>

                    <h3 class="staff-title">

                        Chuyển lớp học viên

                    </h3>

                    <span>

                        Cập nhật lớp học cho học viên

                    </span>

                </div>

                <a class="cancel-button"

                   th:href="@{/staff/classes/{id}/students(id=${fromClassId})}">

                    Quay lại

                </a>

            </div>

            <div class="class-info">

                <div class="class-info-card">

                    <h4>Học viên</h4>

                    <p th:text="${student.fullName}"></p>

                </div>

                <div class="class-info-card">

                    <h4>Email</h4>

                    <p th:text="${student.email}"></p>

                </div>

                <div class="class-info-card">

                    <h4>Lớp hiện tại</h4>

                    <p th:text="${fromClass.className}"></p>

                </div>

            </div>

            <form method="post"

                  th:action="@{/staff/class-students/transfer}"

                  class="admin-form">

                <input type="hidden"

                       th:name="${_csrf.parameterName}"

                       th:value="${_csrf.token}">

                <input type="hidden"

                       name="studentId"

                       th:value="${student.id}">

                <input type="hidden"

                       name="fromClassId"

                       th:value="${fromClass.id}">

                <div class="form-grid">

                    <div class="form-group">

                        <label>

                            Lớp mới

                        </label>

                        <select name="toClassId">

                            <option value="">

                                -- Chọn lớp --

                            </option>

                            <option

                                    th:each="item : ${classes}"

                                    th:value="${item.id}"

                                    th:text="${item.className}">

                            </option>

                        </select>

                    </div>

                    <div class="form-group full">

                        <label>

                            Ghi chú

                        </label>

                        <textarea

                                name="note"

                                class="transfer-note">

            </textarea>

                    </div>

                </div>

                <div class="form-actions">

                    <button

                            type="submit"

                            class="action-button">

                        Xác nhận chuyển lớp

                    </button>

                    <a class="cancel-button"

                       th:href="@{/staff/classes/{id}/students(id=${fromClass.id})}">

                        Hủy

                    </a>

                </div>

            </form>

        </section>

    </main>

</div>

</body>

</html>
