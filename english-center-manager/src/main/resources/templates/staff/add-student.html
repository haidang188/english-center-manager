<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thêm học viên vào lớp</title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

    <link rel="stylesheet"
          th:href="@{/css/staff.css}">

</head>

<body>

<div class="admin-shell">

    <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">

        <div th:replace="~{staff/fragments/topbar :: topbar}"></div>

        <section class="panel">

            <div class="panel-header">

                <div>

                    <h3 class="staff-title">

                        Thêm học viên vào lớp

                    </h3>

                    <span>

                        Chọn học viên từ danh sách hệ thống

                    </span>

                </div>

                <a th:href="@{/staff/classes/{id}/students(id=${classId})}"

                   class="cancel-button">

                    Quay lại

                </a>

            </div>

            <div th:if="${successMessage}"
                 class="flash-message success"
                 th:text="${successMessage}">
            </div>

            <div th:if="${errorMessage}"
                 class="flash-message error"
                 th:text="${errorMessage}">
            </div>

            <form method="get"

                  th:action="@{/staff/classes/{id}/students/add(id=${classId})}"

                  class="filter-form advanced">

                <input

                        type="text"

                        name="keyword"

                        th:value="${keyword}"

                        placeholder="Tìm theo tên hoặc email">

                <button>

                    Tìm kiếm

                </button>

            </form>

            <div class="table-wrapper">

                <table class="admin-table">

                    <thead>

                    <tr>

                        <th>Họ tên</th>

                        <th>Email</th>

                        <th>SĐT</th>

                        <th>Thao tác</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="student : ${students}">

                        <td>

                            <strong
                                    th:text="${student.fullName}">
                            </strong>

                        </td>

                        <td
                                th:text="${student.email}">
                        </td>

                        <td
                                th:text="${student.phoneNumber}">
                        </td>

                        <td>

                            <form method="post"

                                  th:action="@{/staff/classes/{classId}/students/add(classId=${classId})}">

                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input

                                        type="hidden"

                                        name="studentId"

                                        th:value="${student.id}">

                                <button

                                        class="small-button success"

                                        type="submit">

                                    Thêm vào lớp

                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(students)}">

                        <td colspan="4"
                            class="empty-row">

                            Không tìm thấy học viên phù hợp.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

<div class="pagination"
     th:if="${studentsPage != null and studentsPage.totalPages > 1}">

    <a th:classappend="${studentsPage.first} ? ' disabled'"

       th:href="@{/staff/classes/{classId}/students/add(
            classId=${classId},
            page=${studentsPage.number - 1},
            keyword=${keyword})}">

        Trước

    </a>

    <span th:each="pageNumber : ${#numbers.sequence(0, studentsPage.totalPages - 1)}">

        <a th:text="${pageNumber + 1}"

           th:classappend="${pageNumber == studentsPage.number} ? ' active'"

           th:href="@{/staff/classes/{classId}/students/add(
                    classId=${classId},
                    page=${pageNumber},
                    keyword=${keyword})}">

        </a>

    </span>

    <a th:classappend="${studentsPage.last} ? ' disabled'"

       th:href="@{/staff/classes/{classId}/students/add(
            classId=${classId},
            page=${studentsPage.number + 1},
            keyword=${keyword})}">

        Sau

    </a>

</div>

</section>

</main>

</div>

</body>

</html>
