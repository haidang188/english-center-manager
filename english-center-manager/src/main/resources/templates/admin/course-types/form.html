<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cap nhat loai khoa hoc' : 'Them loai khoa hoc'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">
            <div class="panel-header">
                <div>
                    <h3 th:text="${isEdit} ? 'Cap nhat loai khoa hoc' : 'Them loai khoa hoc'"></h3>
                    <span>Loai khoa hoc la nhom chuong trinh de phan loai cac khoa hoc cu the</span>
                </div>

                <a th:href="@{/admin/course-types}" class="secondary-link">Quay lai</a>
            </div>

            <form th:object="${courseTypeForm}"
                  th:action="${isEdit} ? @{/admin/course-types/{id}/edit(id=${courseTypeForm.id})} : @{/admin/course-types/create}"
                  method="post"
                  class="admin-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Ma loai khoa hoc</label>
                        <input type="text" th:field="*{typeCode}" placeholder="TOEIC_2_SKILLS">
                        <p class="field-error" th:if="${#fields.hasErrors('typeCode')}" th:errors="*{typeCode}"></p>
                    </div>

                    <div class="form-group">
                        <label>Ten loai khoa hoc</label>
                        <input type="text" th:field="*{typeName}" placeholder="TOEIC 2 ky nang">
                        <p class="field-error" th:if="${#fields.hasErrors('typeName')}" th:errors="*{typeName}"></p>
                    </div>

                    <div class="form-group">
                        <label>Trang thai</label>
                        <select th:field="*{active}">
                            <option th:value="true">Dang su dung</option>
                            <option th:value="false">Ngung su dung</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label>Mo ta</label>
                        <input type="text" th:field="*{description}" placeholder="Mo ta ngan ve loai khoa hoc">
                        <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Luu loai khoa hoc</button>
                    <a th:href="@{/admin/course-types}" class="cancel-button">Huy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
