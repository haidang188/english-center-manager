<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cap nhat lich hoc' : 'Them lich hoc'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">
            <div class="panel-header">
                <div>
                    <h3 th:text="${isEdit} ? 'Cap nhat lich hoc' : 'Them lich hoc'"></h3>
                    <span>He thong tu kiem tra trung phong, trung lop va trung giao vien</span>
                </div>

                <a th:href="@{/admin/schedules}" class="secondary-link">Quay lai</a>
            </div>

            <form th:object="${scheduleForm}"
                  th:action="${isEdit} ? @{/admin/schedules/{id}/edit(id=${scheduleForm.id})} : @{/admin/schedules/create}"
                  method="post"
                  class="admin-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group full">
                        <label>Lop hoc</label>
                        <select th:field="*{classId}">
                            <option value="">-- Chon lop hoc --</option>
                            <option th:each="courseClass : ${classes}"
                                    th:value="${courseClass.id}"
                                    th:text="${courseClass.className + ' - ' + courseClass.teacher.fullName}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('classId')}" th:errors="*{classId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Phong hoc</label>
                        <select th:field="*{roomId}">
                            <option value="">-- Chon phong hoc --</option>
                            <option th:each="room : ${rooms}"
                                    th:value="${room.id}"
                                    th:text="${room.roomName + ' (' + room.capacity + ' cho)'}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('roomId')}" th:errors="*{roomId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Thu</label>
                        <select th:field="*{dayOfWeek}">
                            <option value="">-- Chon thu --</option>
                            <option th:each="day : ${days}"
                                    th:value="${day}"
                                    th:text="${day}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('dayOfWeek')}" th:errors="*{dayOfWeek}"></p>
                    </div>

                    <div class="form-group">
                        <label>Gio bat dau</label>
                        <input type="time" th:field="*{startTime}">
                        <p class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></p>
                    </div>

                    <div class="form-group">
                        <label>Gio ket thuc</label>
                        <input type="time" th:field="*{endTime}">
                        <p class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></p>
                    </div>

                    <div class="form-group full">
                        <label>Ghi chu</label>
                        <input type="text" th:field="*{note}" placeholder="Khong bat buoc">
                        <p class="field-error" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></p>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(rooms)}" class="flash-message error">
                    Chua co phong hoc active. Hay them phong 101, 102, 201, 202 vao database truoc.
                </div>

                <div th:if="${#lists.isEmpty(classes)}" class="flash-message error">
                    Chua co lop hoc. Hay tao lop hoc truoc khi tao lich.
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Luu lich hoc</button>
                    <a th:href="@{/admin/schedules}" class="cancel-button">Huy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
