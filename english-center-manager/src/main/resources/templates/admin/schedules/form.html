<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cập nhật lịch học' : 'Thêm lịch học'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">
            <div class="panel-header">
                <div>
                    <h3 th:text="${isEdit} ? 'Cập nhật lịch học' : 'Thêm lịch học'"></h3>
                    <span>Hệ thống tự kiểm tra trùng phòng, trùng lớp và trùng giáo viên</span>
                </div>

                <a th:href="@{/admin/schedules}" class="secondary-link">Quay lại</a>
            </div>

            <form th:object="${scheduleForm}"
                  th:action="${isEdit} ? @{/admin/schedules/{id}/edit(id=${scheduleForm.id})} : @{/admin/schedules/create}"
                  method="post"
                  class="admin-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group full">
                        <label>Lớp học</label>
                        <select th:field="*{classId}">
                            <option value="">-- Chọn lớp học --</option>
                            <option th:each="courseClass : ${classes}"
                                    th:value="${courseClass.id}"
                                    th:text="${courseClass.className + ' - ' + courseClass.teacher.fullName}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('classId')}" th:errors="*{classId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Phòng học</label>
                        <select th:field="*{roomId}">
                            <option value="">-- Chọn phòng học --</option>
                            <option th:each="room : ${rooms}"
                                    th:value="${room.id}"
                                    th:text="${room.roomName + ' (' + room.capacity + ' chỗ)'}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('roomId')}" th:errors="*{roomId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Thứ</label>
                        <select th:field="*{dayOfWeek}">
                            <option value="">-- Chọn thứ --</option>
                            <option th:each="day : ${days}"
                                    th:value="${day}"
                                    th:text="${dayLabels[day]}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('dayOfWeek')}" th:errors="*{dayOfWeek}"></p>
                    </div>

                    <div class="form-group">
                        <label>Giờ bắt đầu</label>
                        <input type="time" th:field="*{startTime}">
                        <p class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></p>
                    </div>

                    <div class="form-group">
                        <label>Giờ kết thúc</label>
                        <input type="time" th:field="*{endTime}">
                        <p class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></p>
                    </div>

                    <div class="form-group full">
                        <label>Ghi chú</label>
                        <input type="text" th:field="*{note}" placeholder="Không bắt buộc">
                        <p class="field-error" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></p>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(rooms)}" class="flash-message error">
                    Chưa có phòng học đang sử dụng. Hãy thêm phòng 101, 102, 201, 202 vào database trước.
                </div>

                <div th:if="${#lists.isEmpty(classes)}" class="flash-message error">
                    Chưa có lớp học. Hãy tạo lớp học trước khi tạo lịch.
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Lưu lịch học</button>
                    <a th:href="@{/admin/schedules}" class="cancel-button">Hủy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
