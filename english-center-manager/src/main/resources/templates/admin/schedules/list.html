<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoi khoa bieu</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Thoi khoa bieu</h3>
                    <span>Chon lop, phong, thu va gio hoc; he thong se chan trung lich</span>
                </div>

                <a th:href="@{/admin/schedules/create}" class="action-button">Them lich hoc</a>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/schedules}" method="get" class="filter-form advanced">
                <select name="classId">
                    <option value="">Tat ca lop hoc</option>
                    <option th:each="courseClass : ${classes}"
                            th:value="${courseClass.id}"
                            th:selected="${selectedClassId != null and selectedClassId == courseClass.id}"
                            th:text="${courseClass.className}">
                    </option>
                </select>

                <select name="roomId">
                    <option value="">Tat ca phong</option>
                    <option th:each="room : ${rooms}"
                            th:value="${room.id}"
                            th:selected="${selectedRoomId != null and selectedRoomId == room.id}"
                            th:text="${room.roomName}">
                    </option>
                </select>

                <select name="dayOfWeek">
                    <option value="">Tat ca cac thu</option>
                    <option th:each="day : ${days}"
                            th:value="${day}"
                            th:selected="${selectedDayOfWeek != null and selectedDayOfWeek == day}"
                            th:text="${day}">
                    </option>
                </select>

                <button type="submit">Loc</button>
                <a th:href="@{/admin/schedules}" class="cancel-button compact">Xoa loc</a>
            </form>

            <div class="schedule-board">
                <div class="schedule-card" th:each="schedule : ${schedules}">
                    <div class="schedule-time">
                        <strong th:text="${schedule.dayOfWeek}"></strong>
                        <span th:text="${schedule.startTime} + ' - ' + ${schedule.endTime}"></span>
                    </div>

                    <div class="schedule-detail">
                        <strong th:text="${schedule.courseClass.className}"></strong>
                        <span th:text="${schedule.courseClass.teacher.fullName}"></span>
                        <small th:text="${schedule.room.roomName}"></small>
                    </div>

                    <div class="table-actions">
                        <a th:href="@{/admin/schedules/{id}/edit(id=${schedule.id})}" class="small-button edit">Sua</a>
                        <form th:action="@{/admin/schedules/{id}/delete(id=${schedule.id})}"
                              method="post"
                              onsubmit="return confirm('Ban co chac muon xoa lich hoc nay?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="small-button danger">Xoa</button>
                        </form>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(schedules)}" class="empty-schedule">
                    Chua co lich hoc phu hop
                </div>
            </div>

            <div class="table-wrapper schedule-table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Thu</th>
                        <th>Gio hoc</th>
                        <th>Lop</th>
                        <th>Khoa hoc</th>
                        <th>Giao vien</th>
                        <th>Phong</th>
                        <th>Ghi chu</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="schedule : ${schedules}">
                        <td th:text="${schedule.dayOfWeek}"></td>
                        <td th:text="${schedule.startTime} + ' - ' + ${schedule.endTime}"></td>
                        <td th:text="${schedule.courseClass.className}"></td>
                        <td th:text="${schedule.courseClass.course.courseName}"></td>
                        <td th:text="${schedule.courseClass.teacher.fullName}"></td>
                        <td th:text="${schedule.room.roomName}"></td>
                        <td th:text="${schedule.note}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
