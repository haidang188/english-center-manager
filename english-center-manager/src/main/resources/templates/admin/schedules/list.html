<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời khóa biểu</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Thời khóa biểu</h3>
                    <span>Xem lịch theo thứ và khung giờ để dễ xếp phòng, giáo viên và lớp học.</span>
                </div>

                <a th:href="@{/admin/schedules/create}" class="action-button">Thêm lịch học</a>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/schedules}" method="get" class="filter-form advanced">
                <select name="classId">
                    <option value="">Tất cả lớp học</option>
                    <option th:each="courseClass : ${classes}"
                            th:value="${courseClass.id}"
                            th:selected="${selectedClassId != null and selectedClassId == courseClass.id}"
                            th:text="${courseClass.className}">
                    </option>
                </select>

                <select name="roomId">
                    <option value="">Tất cả phòng</option>
                    <option th:each="room : ${rooms}"
                            th:value="${room.id}"
                            th:selected="${selectedRoomId != null and selectedRoomId == room.id}"
                            th:text="${room.roomName}">
                    </option>
                </select>

                <select name="dayOfWeek">
                    <option value="">Tất cả các thứ</option>
                    <option th:each="day : ${days}"
                            th:value="${day}"
                            th:selected="${selectedDayOfWeek != null and selectedDayOfWeek == day}"
                            th:text="${dayLabels[day]}">
                    </option>
                </select>

                <button type="submit">Lọc</button>
                <a th:href="@{/admin/schedules}" class="cancel-button compact">Xóa lọc</a>
            </form>

            <div class="schedule-calendar">
                <table class="schedule-calendar-table">
                    <thead>
                    <tr>
                        <th>Giờ học</th>
                        <th th:each="day : ${days}" th:text="${dayLabels[day]}"></th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="row : ${scheduleRows}">
                        <th th:text="${row.timeLabel}"></th>
                        <td th:each="day : ${days}" th:with="cellSchedules=${row.schedulesByDay[day]}">
                            <div th:if="${#lists.isEmpty(cellSchedules)}" class="calendar-empty">
                                Trống
                            </div>

                            <div th:each="schedule : ${cellSchedules}" class="calendar-event">
                                <strong th:text="${schedule.room.roomCode + ' - ' + schedule.courseClass.teacher.fullName}"></strong>
                                <span th:text="${schedule.courseClass.className}"></span>
                                <small th:text="${schedule.courseClass.course.courseName}"></small>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(scheduleRows)}">
                        <td th:attr="colspan=${#lists.size(days) + 1}" class="empty-row">
                            Chưa có lịch học phù hợp.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="schedule-action-list">
                <div class="schedule-action-card" th:each="schedule : ${schedules}">
                    <div>
                        <strong th:text="${dayLabels[schedule.dayOfWeek] + ', ' + schedule.startTime + ' - ' + schedule.endTime}"></strong>
                        <span th:text="${schedule.room.roomCode + ' - ' + schedule.courseClass.teacher.fullName + ' - ' + schedule.courseClass.className}"></span>
                    </div>

                    <div class="table-actions">
                        <a th:href="@{/admin/schedules/{id}/edit(id=${schedule.id})}" class="small-button edit">Sửa</a>
                        <form th:action="@{/admin/schedules/{id}/delete(id=${schedule.id})}"
                              method="post"
                              onsubmit="return confirm('Bạn có chắc muốn xóa lịch học này?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="small-button danger">Xóa</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="table-wrapper schedule-table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Thứ</th>
                        <th>Giờ học</th>
                        <th>Lớp</th>
                        <th>Khóa học</th>
                        <th>Giáo viên</th>
                        <th>Phòng</th>
                        <th>Ghi chú</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="schedule : ${schedules}">
                        <td th:text="${dayLabels[schedule.dayOfWeek]}"></td>
                        <td th:text="${schedule.startTime + ' - ' + schedule.endTime}"></td>
                        <td th:text="${schedule.courseClass.className}"></td>
                        <td th:text="${schedule.courseClass.course.courseName}"></td>
                        <td th:text="${schedule.courseClass.teacher.fullName}"></td>
                        <td th:text="${schedule.room.roomName}"></td>
                        <td th:text="${schedule.note}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(schedules)}">
                        <td colspan="7" class="empty-row">Chưa có lịch học phù hợp.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
