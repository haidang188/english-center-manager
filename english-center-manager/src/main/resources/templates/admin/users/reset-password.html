<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel narrow">
            <div class="panel-header">
                <div>
                    <h3>Đặt lại mật khẩu</h3>
                    <span th:text="'Tài khoản: ' + ${user.fullName} + ' (' + ${user.email} + ')'"></span>
                </div>

                <a th:href="@{/admin/users}" class="secondary-link">Quay lại</a>
            </div>

            <form th:object="${resetPasswordForm}"
                  th:action="@{/admin/users/{id}/reset-password(id=${user.id})}"
                  method="post"
                  class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid one-column">
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" th:field="*{newPassword}" placeholder="Tối thiểu 6 ký tự">
                        <p class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu">
                        <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Đặt lại mật khẩu</button>
                    <a th:href="@{/admin/users}" class="cancel-button">Hủy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
