<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Quản lý tài khoản</h3>
                    <span>Tạo, tìm kiếm, lọc và kiểm soát trạng thái tài khoản</span>
                </div>

                <a th:href="@{/admin/users/create}" class="action-button">
                    Thêm tài khoản
                </a>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/users}" method="get" class="filter-form advanced">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm tên, email, số điện thoại...">

                <select name="roleId">
                    <option value="">Tất cả vai trò</option>
                    <option th:each="role : ${roles}"
                            th:value="${role.id}"
                            th:selected="${selectedRoleId != null and selectedRoleId == role.id}"
                            th:text="${role.name}">
                    </option>
                </select>

                <select name="status">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:selected="${selectedStatus != null and selectedStatus == status}"
                            th:text="${status}">
                    </option>
                </select>

                <button type="submit">Lọc</button>
                <a th:href="@{/admin/users}" class="cancel-button compact">Xóa lọc</a>
            </form>

            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td>
                            <strong th:text="${user.fullName}"></strong>
                            <small th:if="${user.identityNumber}" th:text="'CCCD: ' + ${user.identityNumber}"></small>
                        </td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.phoneNumber}"></td>
                        <td><span class="role-pill" th:text="${user.role.name}"></span></td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${user.status.name() == 'ACTIVE'} ? ' active' : ' inactive'"
                                  th:text="${user.status}">
                            </span>
                        </td>
                        <td class="table-actions">
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="small-button edit">
                                Sửa
                            </a>

                            <a th:href="@{/admin/users/{id}/reset-password(id=${user.id})}"
                               class="small-button warning">Mật khẩu</a>

                            <form th:if="${user.status.name() == 'ACTIVE'}"
                                  th:action="@{/admin/users/{id}/lock(id=${user.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="small-button danger">Khóa</button>
                            </form>

                            <form th:if="${user.status.name() == 'INACTIVE'}"
                                  th:action="@{/admin/users/{id}/unlock(id=${user.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="small-button success">Mở khóa</button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" class="empty-row">
                            Không có tài khoản phù hợp
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${usersPage != null and usersPage.totalPages > 1}">
                <a th:classappend="${usersPage.first} ? ' disabled'"
                   th:href="@{/admin/users(page=${usersPage.number - 1}, keyword=${keyword}, roleId=${selectedRoleId}, status=${selectedStatus})}">
                    Trước
                </a>

                <span th:each="pageNumber : ${#numbers.sequence(0, usersPage.totalPages - 1)}">
                    <a th:href="@{/admin/users(page=${pageNumber}, keyword=${keyword}, roleId=${selectedRoleId}, status=${selectedStatus})}"
                       th:classappend="${pageNumber == usersPage.number} ? ' active'"
                       th:text="${pageNumber + 1}">
                    </a>
                </span>

                <a th:classappend="${usersPage.last} ? ' disabled'"
                   th:href="@{/admin/users(page=${usersPage.number + 1}, keyword=${keyword}, roleId=${selectedRoleId}, status=${selectedStatus})}">
                    Sau
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
