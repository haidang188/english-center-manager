<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cập nhật tài khoản' : 'Thêm tài khoản'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">
            <div class="panel-header">
                <div>
                    <h3 th:text="${isEdit} ? 'Cập nhật tài khoản' : 'Thêm tài khoản'"></h3>
                    <span th:text="${isEdit} ? 'Cập nhật thông tin và phân quyền' : 'Tạo tài khoản mới cho trung tâm'"></span>
                </div>

                <a th:href="@{/admin/users}" class="secondary-link">Quay lại</a>
            </div>

            <form th:object="${userForm}"
                  th:action="${isEdit} ? @{/admin/users/{id}/edit(id=${userForm.id})} : @{/admin/users/create}"
                  method="post"
                  class="admin-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Họ tên</label>
                        <input type="text" th:field="*{fullName}" placeholder="Nguyễn Văn A">
                        <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" placeholder="name@example.com">
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}"
                               th:placeholder="${isEdit} ? 'Bỏ trống nếu không đổi' : 'Tối thiểu 6 ký tự'">
                        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phoneNumber}" placeholder="0901234567">
                        <p class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                    </div>

                    <div class="form-group">
                        <label>Ngày sinh</label>
                        <input type="date" th:field="*{dateOfBirth}">
                    </div>

                    <div class="form-group">
                        <label>CCCD/CMND</label>
                        <input type="text" th:field="*{identityNumber}" placeholder="Không bắt buộc">
                        <p class="field-error" th:if="${#fields.hasErrors('identityNumber')}" th:errors="*{identityNumber}"></p>
                    </div>

                    <div class="form-group">
                        <label>Vai trò</label>
                        <select th:field="*{roleId}">
                            <option value="">-- Chọn vai trò --</option>
                            <option th:each="role : ${roles}"
                                    th:value="${role.id}"
                                    th:text="${role.name}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select th:field="*{status}">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
                    </div>

                    <div class="form-group full">
                        <label>Địa chỉ</label>
                        <input type="text" th:field="*{address}" placeholder="Địa chỉ liên hệ">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">
                        Lưu tài khoản
                    </button>

                    <a th:href="@{/admin/users}" class="cancel-button">
                        Hủy
                    </a>

                    <a th:if="${isEdit}"
                       th:href="@{/admin/users/{id}/reset-password(id=${userForm.id})}"
                       class="secondary-link">Đặt lại mật khẩu</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
