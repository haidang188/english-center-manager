<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý lớp học</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3>Quản lý lớp học</h3>
                    <span>Tao lop, phan cong giao vien va theo doi trang thai lop</span>
                </div>

                <a th:href="@{/admin/classes/create}" class="action-button">Thêm lớp học</a>
            </div>

            <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/classes}" method="get" class="filter-form advanced">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tim ma lop, ten lop, giao vien...">

                <select name="courseId">
                    <option value="">Tất cả khóa học</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:selected="${selectedCourseId != null and selectedCourseId == course.id}"
                            th:text="${course.courseName}">
                    </option>
                </select>

                <select name="status">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:selected="${selectedStatus != null and selectedStatus == status}"
                            th:text="${status}">
                    </option>
                </select>

                <button type="submit">Lọc</button>
                <a th:href="@{/admin/classes}" class="cancel-button compact">Xóa lọc</a>
            </form>

            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Mã lớp</th>
                        <th>Tên lớp</th>
                        <th>Khóa học</th>
                        <th>Giáo viên</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Thao tac</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="courseClass : ${classes}">
                        <td><strong th:text="${courseClass.classCode}"></strong></td>
                        <td th:text="${courseClass.className}"></td>
                        <td>
                            <strong th:text="${courseClass.course.courseName}"></strong>
                            <small th:text="${courseClass.course.courseType.typeName}"></small>
                        </td>
                        <td th:text="${courseClass.teacher.fullName}"></td>
                        <td>
                            <span th:text="${courseClass.startDate}"></span>
                            <small th:if="${courseClass.endDate}" th:text="'den ' + ${courseClass.endDate}"></small>
                        </td>
                        <td>
                            <span class="status-badge active" th:text="${courseClass.status}"></span>
                        </td>
                        <td class="table-actions">
                            <a th:href="@{/admin/classes/{id}/edit(id=${courseClass.id})}" class="small-button edit">Sửa</a>
                            <a th:href="@{/admin/schedules(classId=${courseClass.id})}" class="small-button warning">Lich</a>

                            <form th:action="@{/admin/classes/{id}/status(id=${courseClass.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <select name="status" class="compact-select">
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:selected="${courseClass.status == status}"
                                            th:text="${status}">
                                    </option>
                                </select>
                                <button type="submit" class="small-button success">Lưu</button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(classes)}">
                        <td colspan="7" class="empty-row">Không có lớp học phù hợp</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${classesPage != null and classesPage.totalPages > 1}">
                <a th:classappend="${classesPage.first} ? ' disabled'"
                   th:href="@{/admin/classes(page=${classesPage.number - 1}, keyword=${keyword}, courseId=${selectedCourseId}, status=${selectedStatus})}">
                    Truoc
                </a>

                <span th:each="pageNumber : ${#numbers.sequence(0, classesPage.totalPages - 1)}">
                    <a th:href="@{/admin/classes(page=${pageNumber}, keyword=${keyword}, courseId=${selectedCourseId}, status=${selectedStatus})}"
                       th:classappend="${pageNumber == classesPage.number} ? ' active'"
                       th:text="${pageNumber + 1}">
                    </a>
                </span>

                <a th:classappend="${classesPage.last} ? ' disabled'"
                   th:href="@{/admin/classes(page=${classesPage.number + 1}, keyword=${keyword}, courseId=${selectedCourseId}, status=${selectedStatus})}">
                    Sau
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
