<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cập nhật lớp học' : 'Thêm lớp học'"></title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="panel form-panel">
            <div class="panel-header">
                <div>
                    <h3 th:text="${isEdit} ? 'Cập nhật lớp học' : 'Thêm lớp học'"></h3>
                    <span>Lớp học là lớp mở thực tế gắn với một khóa học và một giáo viên</span>
                </div>

                <a th:href="@{/admin/classes}" class="secondary-link">Quay lại</a>
            </div>

            <form th:object="${classForm}"
                  th:action="${isEdit} ? @{/admin/classes/{id}/edit(id=${classForm.id})} : @{/admin/classes/create}"
                  method="post"
                  class="admin-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Mã lớp</label>
                        <input type="text" th:field="*{classCode}" placeholder="TOEIC2_BASIC_C01">
                        <p class="field-error" th:if="${#fields.hasErrors('classCode')}" th:errors="*{classCode}"></p>
                    </div>

                    <div class="form-group">
                        <label>Tên lớp</label>
                        <input type="text" th:field="*{className}" placeholder="TOEIC 2 kỹ năng cơ bản - Lớp 01">
                        <p class="field-error" th:if="${#fields.hasErrors('className')}" th:errors="*{className}"></p>
                    </div>

                    <div class="form-group">
                        <label>Khóa học</label>
                        <select th:field="*{courseId}">
                            <option value="">-- Chọn khóa học --</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Giáo viên</label>
                        <select th:field="*{teacherId}">
                            <option value="">-- Chon giao vien --</option>
                            <option th:each="teacher : ${teachers}"
                                    th:value="${teacher.id}"
                                    th:text="${teacher.fullName + ' - ' + teacher.email}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('teacherId')}" th:errors="*{teacherId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Ngay bat dau</label>
                        <input type="date" th:field="*{startDate}">
                    </div>

                    <div class="form-group">
                        <label>Ngay ket thuc</label>
                        <input type="date" th:field="*{endDate}">
                        <p class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></p>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select th:field="*{status}">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(teachers)}" class="flash-message error">
                    Chưa có giáo viên. Hãy tạo tài khoản role TEACHER trước khi tạo lớp.
                </div>

                <div class="form-actions">
                    <button type="submit" class="action-button">Lưu lớp học</button>
                    <a th:href="@{/admin/classes}" class="cancel-button">Hủy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
