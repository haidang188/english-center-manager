<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Thành phần điểm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="content-panel">
            <div class="page-header">
                <div>
                    <h1 th:text="${title}"></h1>
                    <p>
                        <span th:text="${course.courseCode}"></span>
                        -
                        <span th:text="${course.courseName}"></span>
                    </p>
                </div>
                <a th:href="@{/admin/courses/{id}/score-components(id=${course.id})}" class="btn btn-light">
                    Quay lại
                </a>
            </div>

            <form th:action="@{${actionUrl}}" th:object="${scoreComponentForm}" method="post" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Mã thành phần điểm</label>
                        <input type="text" th:field="*{componentCode}">
                        <p class="field-error" th:errors="*{componentCode}"></p>
                    </div>

                    <div class="form-group">
                        <label>Tên thành phần điểm</label>
                        <input type="text" th:field="*{componentName}">
                        <p class="field-error" th:errors="*{componentName}"></p>
                    </div>

                    <div class="form-group">
                        <label>Điểm tối đa</label>
                        <input type="number" step="0.01" th:field="*{maxScore}">
                        <p class="field-error" th:errors="*{maxScore}"></p>
                    </div>

                    <div class="form-group">
                        <label>Tỷ trọng điểm (%)</label>
                        <input type="number" step="0.01" th:field="*{weightPercent}">
                        <p class="field-error" th:errors="*{weightPercent}"></p>
                    </div>

                    <div class="form-group">
                        <label>Thứ tự hiển thị</label>
                        <input type="number" th:field="*{displayOrder}">
                        <p class="field-error" th:errors="*{displayOrder}"></p>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" th:field="*{required}">
                            Bắt buộc nhập điểm
                        </label>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" th:field="*{calculated}">
                            Tính vào điểm tổng kết
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <a th:href="@{/admin/courses/{id}/score-components(id=${course.id})}" class="btn btn-light">Hủy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
