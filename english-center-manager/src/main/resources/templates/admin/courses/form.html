<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Khoa hoc</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="content-panel">
            <div class="page-header">
                <div>
                    <h1 th:text="${title}"></h1>
                    <p>Nhap thong tin khoa hoc</p>
                </div>
                <a th:href="@{/admin/courses}" class="btn btn-light">Quay lai</a>
            </div>

            <form th:action="@{${actionUrl}}" th:object="${courseForm}" method="post" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Ma khoa hoc</label>
                        <input type="text" th:field="*{courseCode}">
                        <p class="field-error" th:errors="*{courseCode}"></p>
                    </div>

                    <div class="form-group">
                        <label>Ten khoa hoc</label>
                        <input type="text" th:field="*{courseName}">
                        <p class="field-error" th:errors="*{courseName}"></p>
                    </div>

                    <div class="form-group">
                        <label>Loai khoa hoc</label>
                        <select th:field="*{courseTypeId}">
                            <option value="">-- Chon loai khoa hoc --</option>
                            <option th:each="type : ${courseTypes}"
                                    th:value="${type.id}"
                                    th:text="${type.typeName}">
                            </option>
                        </select>
                        <p class="field-error" th:errors="*{courseTypeId}"></p>
                    </div>

                    <div class="form-group">
                        <label>Trang thai</label>
                        <select th:field="*{active}">
                            <option th:value="true">Dang su dung</option>
                            <option th:value="false">Ngung su dung</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Mo ta</label>
                        <textarea rows="4" th:field="*{description}"></textarea>
                        <p class="field-error" th:errors="*{description}"></p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Luu</button>
                    <a th:href="@{/admin/courses}" class="btn btn-light">Huy</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
