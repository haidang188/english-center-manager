<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấu hình điểm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="admin-main">
        <div th:replace="~{admin/fragments/topbar :: topbar}"></div>

        <section class="content-panel">
            <div class="page-header">
                <div>
                    <h1>Cấu hình điểm</h1>
                    <p>
                        <span th:text="${course.courseCode}"></span>
                        -
                        <span th:text="${course.courseName}"></span>
                    </p>
                </div>

                <div class="header-actions">
                    <a th:href="@{/admin/score-components}" class="btn btn-light">Quay lại</a>
                    <a th:href="@{/admin/courses/{id}/score-components/create(id=${course.id})}" class="btn btn-primary">
                        + Thêm thành phần điểm
                    </a>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <div class="summary-strip">
                <div>
                    <strong>Tổng tỷ trọng</strong>
                    <span th:text="${totalWeight} + '%'"></span>
                </div>

                <div th:if="${totalWeightComplete}" class="status-badge status-active">
                    Đủ 100%
                </div>

                <div th:if="${!totalWeightComplete and !totalWeightOver}" class="status-badge status-warning">
                    Chưa đủ 100%
                </div>

                <div th:if="${totalWeightOver}" class="status-badge status-inactive">
                    Vượt 100%
                </div>
            </div>

            <div class="table-card">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Thứ tự</th>
                        <th>Mã điểm</th>
                        <th>Tên thành phần</th>
                        <th>Điểm tối đa</th>
                        <th>Tỷ trọng</th>
                        <th>Bắt buộc</th>
                        <th>Tính điểm</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="component : ${components}">
                        <td th:text="${component.displayOrder}"></td>
                        <td th:text="${component.componentCode}"></td>
                        <td th:text="${component.componentName}"></td>
                        <td th:text="${component.maxScore}"></td>
                        <td th:text="${component.weightPercent} + '%'"></td>
                        <td>
                            <span th:if="${component.required}" class="boolean-mark boolean-yes" title="Có">&#10003;</span>
                            <span th:unless="${component.required}" class="boolean-mark boolean-no" title="Không">&#10005;</span>
                        </td>
                        <td>
                            <span th:if="${component.calculated}" class="boolean-mark boolean-yes" title="Có">&#10003;</span>
                            <span th:unless="${component.calculated}" class="boolean-mark boolean-no" title="Không">&#10005;</span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/admin/courses/{courseId}/score-components/{componentId}/edit(courseId=${course.id}, componentId=${component.id})}"
                               class="btn btn-small">
                                Sửa
                            </a>

                            <form th:action="@{/admin/courses/{courseId}/score-components/{componentId}/delete(courseId=${course.id}, componentId=${component.id})}"
                                  method="post"
                                  class="inline-form"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa thành phần điểm này?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-small btn-danger">Xóa</button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${components.isEmpty()}">
                        <td colspan="8" class="empty-text">Chưa cấu hình thành phần điểm</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
